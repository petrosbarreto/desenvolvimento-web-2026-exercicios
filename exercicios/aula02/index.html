<!--Fiz algumas mudanças devido a interface-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula 02 - Requisições HTTP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📡 Requisições HTTP - JSONPlaceholder API</h1>
  </header>

          <main>  
    <section id="info-section">
      <div id="post-resultado"></div>
      <h2>Informações da Última Requisição</h2>
      <div id="requisicao-info">
        <p><strong>Método:</strong> <span id="info-metodo">-</span></p>
        <p><strong>URL:</strong> <span id="info-url">-</span></p>
        <p><strong>Status:</strong> <span id="info-status">-</span></p>
        <p><strong>Tempo:</strong> <span id="info-tempo">-</span></p>
      </div>
    </section>
  </main>

      <h2 style="color: rgb(247, 247, 247);">Criar Novo Post</h2>
      <form id="form-post">
        <label for="titulo" style="color:rgb(247, 247, 247)">Título:</label>
        <input type="text" id="titulo" required>
        
        <label for="conteudo" style="color:rgb(255, 255, 255)">Conteúdo:</label>
        <textarea id="conteudo" required id="conteudo" maxlength="500"></textarea>
        
        <button type="submit">📤 Enviar Post</button>
        <div id="enviando" class="hidden">Enviando...</div>  
      </form>

  <main>
        <div id="posts-container"></div>
  </main>      

  <mainuser> <!-- mudança da parte de usuários para o lado -->
      <div id="usuarios-container"></div>
  </mainuser> 
  
  <mainbt>
      <button id="btn-carregar">🔄 Carregar Usuários</button>
      <div id="loading" class="hidden">Carregando...</div>  
  </mainbt>

  <footer>
    <p>Aula 02 - Desenvolvimento Web 2026.1</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
